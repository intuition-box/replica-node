# Extract API key from URL: /http/KEY or /ws/KEY
map $uri $api_key {
    ~^/http/(?<k>[a-zA-Z0-9]+)  $k;
    ~^/ws/(?<k>[a-zA-Z0-9]+)    $k;
    default                      "";
}

# Validate key against the generated keys.map file
# keys.map contains lines like: "abc123" 1;
# If no keys are configured, it contains: default 1;
map $api_key $key_valid {
    include /etc/nginx/keys.map;
}

# Log format with API key for stats
log_format rpc '$time_iso8601 key=$api_key method=$request_method uri=$uri status=$status time=$request_time';

server {
    listen 80;
    server_name _;

    # RPC request log (for stats)
    access_log /data/rpc.log rpc;

    # Dashboard - always public
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        access_log off;
    }

    # Status API - always public
    location /api/status {
        proxy_pass http://init:9000/api/status;
        proxy_set_header Host $host;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin *;
        access_log off;
    }

    # CORS preflight for RPC endpoints
    location ~ ^/http(/[a-zA-Z0-9]+)?$ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin '*';
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type';
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        if ($key_valid = 0) {
            add_header Access-Control-Allow-Origin '*' always;
            return 401 '{"error":"Invalid or missing API key"}';
        }

        rewrite ^/http(/[a-zA-Z0-9]+)?$ / break;
        proxy_pass http://nitro:8545;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        client_max_body_size 10m;
        add_header Access-Control-Allow-Origin '*' always;
    }

    # WebSocket endpoint: /ws or /ws/KEY
    location ~ ^/ws(/[a-zA-Z0-9]+)?$ {
        if ($key_valid = 0) {
            add_header Access-Control-Allow-Origin '*' always;
            return 401 '{"error":"Invalid or missing API key"}';
        }

        rewrite ^/ws(/[a-zA-Z0-9]+)?$ / break;
        proxy_pass http://nitro:8546;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
